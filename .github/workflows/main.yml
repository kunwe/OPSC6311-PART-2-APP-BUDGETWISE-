name: Build and Test BudgetWise

# Trigger on push to main/master and on pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up JDK 17 (required by your project)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'   # Eclipse Temurin (Adoptium)

      # Grant execute permission for gradlew
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # Cache Gradle dependencies to speed up builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Build the debug APK (this also catches compilation errors)
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # Run unit tests (if any) — instrumented tests need emulator, so we skip them
      - name: Run unit tests
        run: ./gradlew test

      # Optional: Upload the APK as an artifact
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BudgetWise-debug
          path: app/build/outputs/apk/debug/app-debug.apk
